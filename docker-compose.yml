version: '3.8'

services:
  # ─── Databases ─────────────────────────────────────────────
  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5437:5432'
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - foodrush-network

  postgres-user:
    image: postgres:15-alpine
    container_name: postgres-user
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - foodrush-network

  postgres-order:
    image: postgres:15-alpine
    container_name: postgres-order
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    networks:
      - foodrush-network

  postgres-payment:
    image: postgres:15-alpine
    container_name: postgres-payment
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5435:5432'
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    networks:
      - foodrush-network

  postgres-delivery:
    image: postgres:15-alpine
    container_name: postgres-delivery
    environment:
      POSTGRES_DB: delivery_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5436:5432'
    volumes:
      - postgres_delivery_data:/var/lib/postgresql/data
    networks:
      - foodrush-network

  mongodb:
    image: mongo:6-jammy
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - foodrush-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - foodrush-network

  # ─── Message Queue ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - foodrush-network

  # ─── Microservices ─────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      RESTAURANT_SERVICE_URL: http://restaurant-service:3003
      CART_SERVICE_URL: http://cart-service:3004
      ORDER_SERVICE_URL: http://order-service:3005
      PAYMENT_SERVICE_URL: http://payment-service:3006
      DELIVERY_SERVICE_URL: http://delivery-service:3007
      NOTIFICATION_SERVICE_URL: http://notification-service:3008
      JWT_SECRET: foodrush_jwt_super_secret_2024
    depends_on:
      - auth-service
      - user-service
      - restaurant-service
      - cart-service
      - order-service
      - payment-service
      - delivery-service
      - notification-service
    networks:
      - foodrush-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: foodrush_jwt_super_secret_2024
      JWT_EXPIRES_IN: 7d
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    depends_on:
      - postgres-auth
      - rabbitmq
    networks:
      - foodrush-network

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      DB_HOST: postgres-user
      DB_PORT: 5432
      DB_NAME: user_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    depends_on:
      - postgres-user
      - rabbitmq
    networks:
      - foodrush-network

  restaurant-service:
    build:
      context: ./services/restaurant-service
      dockerfile: Dockerfile
    container_name: restaurant-service
    ports:
      - '3003:3003'
    environment:
      PORT: 3003
      MONGODB_URI: mongodb://mongo:mongo@mongodb:27017/restaurant_db?authSource=admin
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - foodrush-network

  cart-service:
    build:
      context: ./services/cart-service
      dockerfile: Dockerfile
    container_name: cart-service
    ports:
      - '3004:3004'
    environment:
      PORT: 3004
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - foodrush-network

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - '3005:3005'
    environment:
      PORT: 3005
      DB_HOST: postgres-order
      DB_PORT: 5432
      DB_NAME: order_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    depends_on:
      - postgres-order
      - rabbitmq
    networks:
      - foodrush-network

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - '3006:3006'
    environment:
      PORT: 3006
      DB_HOST: postgres-payment
      DB_PORT: 5432
      DB_NAME: payment_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      STRIPE_SECRET_KEY: sk_test_your_stripe_key_here
      STRIPE_WEBHOOK_SECRET: whsec_your_webhook_secret_here
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    depends_on:
      - postgres-payment
      - rabbitmq
    networks:
      - foodrush-network

  delivery-service:
    build:
      context: ./services/delivery-service
      dockerfile: Dockerfile
    container_name: delivery-service
    ports:
      - '3007:3007'
    environment:
      PORT: 3007
      DB_HOST: postgres-delivery
      DB_PORT: 5432
      DB_NAME: delivery_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    depends_on:
      - postgres-delivery
      - rabbitmq
    networks:
      - foodrush-network

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - '3008:3008'
    environment:
      PORT: 3008
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your_email@gmail.com
      SMTP_PASS: your_app_password
    depends_on:
      - rabbitmq
    networks:
      - foodrush-network

  # ─── Frontend Apps ─────────────────────────────────────────
  customer-app:
    build:
      context: ./frontend/customer-app
      dockerfile: Dockerfile
    container_name: customer-app
    ports:
      - '4000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - api-gateway
    networks:
      - foodrush-network

  restaurant-app:
    build:
      context: ./frontend/restaurant-app
      dockerfile: Dockerfile
    container_name: restaurant-app
    ports:
      - '4001:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - api-gateway
    networks:
      - foodrush-network

  admin-app:
    build:
      context: ./frontend/admin-app
      dockerfile: Dockerfile
    container_name: admin-app
    ports:
      - '4002:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - api-gateway
    networks:
      - foodrush-network

networks:
  foodrush-network:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_user_data:
  postgres_order_data:
  postgres_payment_data:
  postgres_delivery_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
